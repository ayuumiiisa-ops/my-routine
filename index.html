<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#22c55e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="マイルーティン" />
<link rel="manifest" href="manifest.json" />
<title>マイルーティン</title>
<style>
  :root {
    --green: #22c55e;
    --green-d: #16a34a;
    --bg: #f4f6f5;
    --card: #ffffff;
    --ink: #1f2937;
    --sub: #9ca3af;
    --line: #eef0ef;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding-bottom: calc(72px + var(--safe-b));
    -webkit-font-smoothing: antialiased;
  }
  .screen { display: none; padding: 16px; max-width: 640px; margin: 0 auto; }
  .screen.active { display: block; }
  .h1 { font-size: 22px; font-weight: 800; margin: 8px 2px 2px; }
  .sub { color: var(--sub); font-size: 13px; margin: 0 2px 16px; }

  /* progress ring */
  .ring-wrap { display:flex; align-items:center; gap:16px; background:var(--card); border-radius:18px; padding:18px; box-shadow:var(--shadow); margin-bottom:16px; }
  .ring { position: relative; width: 76px; height: 76px; flex:0 0 auto; }
  .ring svg { transform: rotate(-90deg); }
  .ring .pct { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:18px; }
  .ring-txt b { font-size: 16px; }
  .ring-txt span { color: var(--sub); font-size: 13px; }

  .card { background: var(--card); border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; margin-bottom: 14px; }
  .card .group-t { font-size: 12px; color: var(--sub); padding: 12px 16px 4px; font-weight: 700; letter-spacing:.02em;}

  .item { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-top: 1px solid var(--line); }
  .item:first-child { border-top: none; }
  .item .emoji { font-size: 24px; width: 30px; text-align: center; }
  .item .body { flex: 1; min-width: 0; }
  .item .name { font-weight: 600; font-size: 15px; }
  .item .time { font-size: 12px; color: var(--sub); margin-top: 1px; }
  .item.done .name { color: var(--sub); text-decoration: line-through; }
  .check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #d1d5db; flex:0 0 auto; display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; transition: .15s; }
  .item.done .check { background: var(--green); border-color: var(--green); }

  .empty { text-align:center; color:var(--sub); padding: 40px 20px; font-size:14px; line-height:1.7;}

  /* calendar */
  .cal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .cal-head b { font-size:17px; font-weight:800; }
  .cal-nav { background:var(--card); border:none; width:36px; height:36px; border-radius:10px; font-size:18px; box-shadow:var(--shadow); color:var(--ink); }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  .cal-dow { text-align:center; font-size:11px; color:var(--sub); padding:4px 0; font-weight:700; }
  .cal-cell { aspect-ratio:1; border-radius:12px; background:var(--card); box-shadow:var(--shadow); display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; font-size:13px; font-weight:600; }
  .cal-cell.blank { background:transparent; box-shadow:none; }
  .cal-cell.today { outline:2px solid var(--green); }
  .cal-cell .dot { width:7px; height:7px; border-radius:50%; margin-top:3px; background:transparent; }
  .cal-cell small { position:absolute; bottom:5px; font-size:9px; color:var(--sub); }

  /* stats */
  .stat-row { display:flex; gap:12px; margin-bottom:14px; }
  .stat-box { flex:1; background:var(--card); border-radius:16px; padding:16px; box-shadow:var(--shadow); text-align:center; }
  .stat-box .n { font-size:26px; font-weight:800; }
  .stat-box .l { font-size:12px; color:var(--sub); margin-top:2px; }
  .bar-row { display:flex; align-items:center; gap:10px; padding:10px 16px; border-top:1px solid var(--line); }
  .bar-row:first-child{border-top:none;}
  .bar-row .emoji { font-size:20px; width:26px; text-align:center;}
  .bar-row .bl { flex:1; }
  .bar-row .bn { font-size:13px; margin-bottom:4px; display:flex; justify-content:space-between;}
  .bar-track { height:8px; background:var(--line); border-radius:6px; overflow:hidden; }
  .bar-fill { height:100%; background:var(--green); border-radius:6px; }

  /* routines mgmt */
  .btn { background:var(--green); color:#fff; border:none; border-radius:14px; padding:14px; font-size:15px; font-weight:700; width:100%; box-shadow:var(--shadow); }
  .btn:active { background:var(--green-d); }
  .del { background:none; border:none; color:#ef4444; font-size:13px; padding:6px 8px; }

  /* todo */
  .h2 { font-size: 15px; font-weight: 800; margin: 22px 2px 10px; }
  .todo-add-row { display:flex; gap:8px; margin-bottom:14px; }
  .todo-add-row input { flex:1; border:1px solid #e5e7eb; border-radius:12px; padding:12px; font-size:16px; font-family:inherit; background:var(--card); }
  .todo-add-row button { background:var(--green); color:#fff; border:none; border-radius:12px; padding:0 18px; font-weight:700; font-size:14px; }
  .todo-item { display:flex; align-items:center; gap:12px; padding:13px 16px; border-top:1px solid var(--line); }
  .todo-item:first-child { border-top:none; }
  .todo-item .emoji { font-size:22px; width:28px; text-align:center; }
  .todo-item .tx { flex:1; font-size:15px; font-weight:600; }
  .todo-item.done .tx { color:var(--sub); text-decoration:line-through; }
  .todo-item .carry { font-size:10px; color:#f59e0b; background:#fef3c7; padding:2px 7px; border-radius:8px; font-weight:700; }
  .todo-item .del { color:var(--sub); }
  .cat-tabs { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:12px; -webkit-overflow-scrolling:touch; }
  .cat-tabs button { flex:0 0 auto; background:var(--card); border:none; border-radius:20px; padding:8px 16px; font-size:13px; font-weight:700; color:var(--sub); box-shadow:var(--shadow); }
  .cat-tabs button.active { background:#1f2937; color:#fff; }
  .chip-wrap { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .chip { display:flex; align-items:center; gap:8px; background:var(--card); border:none; border-radius:24px; padding:11px 12px; box-shadow:var(--shadow); text-align:left; }
  .chip .ce { font-size:18px; flex:0 0 auto; }
  .chip .ct { flex:1; font-size:13px; font-weight:600; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .chip .cp { flex:0 0 auto; width:22px; height:22px; border-radius:50%; background:#1f2937; color:#fff; font-size:15px; display:flex; align-items:center; justify-content:center; }
  .chip.added .cp { background:var(--green); }

  /* bottom nav */
  .nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--line); display: flex; padding-bottom: var(--safe-b); z-index: 50; }
  .nav button { flex: 1; background: none; border: none; padding: 9px 0 7px; color: var(--sub); font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .nav button .ic { font-size: 21px; line-height:1; }
  .nav button.active { color: var(--green); font-weight: 700; }

  /* modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; align-items: flex-end; z-index: 100; }
  .modal-bg.show { display: flex; }
  .modal { background: #fff; width: 100%; max-width: 640px; margin: 0 auto; border-radius: 20px 20px 0 0; padding: 20px 18px calc(20px + var(--safe-b)); }
  .modal h3 { margin: 4px 0 16px; font-size: 18px; }
  .field { margin-bottom: 14px; }
  .field label { font-size: 12px; color: var(--sub); font-weight: 700; display:block; margin-bottom:6px; }
  .field input[type=text], .field input[type=time] { width: 100%; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; font-size: 16px; font-family: inherit; }
  .emoji-pick { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; max-height: 132px; overflow-y: auto; }
  .emoji-pick button { font-size: 22px; padding: 6px 0; border: 1px solid transparent; border-radius: 10px; background: var(--bg); }
  .emoji-pick button.sel { border-color: var(--green); background: #dcfce7; }
  .modal-actions { display:flex; gap:10px; margin-top:6px; }
  .modal-actions .btn.ghost { background:var(--bg); color:var(--ink); }
</style>
</head>
<body>

<!-- 今日 -->
<section id="today" class="screen active">
  <div class="h1">今日のルーティン</div>
  <div class="sub" id="today-date"></div>
  <div class="ring-wrap">
    <div class="ring">
      <svg width="76" height="76">
        <circle cx="38" cy="38" r="32" stroke="#eef0ef" stroke-width="8" fill="none"/>
        <circle id="ring-fg" cx="38" cy="38" r="32" stroke="#22c55e" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="201" stroke-dashoffset="201"/>
      </svg>
      <div class="pct" id="ring-pct">0%</div>
    </div>
    <div class="ring-txt">
      <b id="ring-count">0 / 0</b><br/>
      <span id="ring-msg">習慣を登録して始めよう</span>
    </div>
  </div>
  <div id="today-list"></div>
</section>

<!-- ToDo -->
<section id="todo" class="screen">
  <div class="h1">ToDo</div>
  <div class="sub">今日だけの1回限りタスク（できるまで翌日に繰り越し）</div>
  <div class="todo-add-row">
    <input type="text" id="todo-in" placeholder="自分のToDoを追加" maxlength="40" />
    <button id="todo-add">追加</button>
  </div>
  <div class="card" id="todo-list"></div>
  <div class="h2">🔥 人気のToDoから追加</div>
  <div class="cat-tabs" id="todo-cats"></div>
  <div class="chip-wrap" id="todo-presets"></div>
</section>

<!-- カレンダー -->
<section id="calendar" class="screen">
  <div class="h1">カレンダー</div>
  <div class="sub">色が濃いほど達成率が高い日</div>
  <div class="cal-head">
    <button class="cal-nav" id="cal-prev">‹</button>
    <b id="cal-title"></b>
    <button class="cal-nav" id="cal-next">›</button>
  </div>
  <div class="cal-grid" id="cal-dow"></div>
  <div class="cal-grid" id="cal-grid" style="margin-top:6px;"></div>
</section>

<!-- 統計 -->
<section id="stats" class="screen">
  <div class="h1">統計</div>
  <div class="sub" id="stats-month"></div>
  <div class="stat-row">
    <div class="stat-box"><div class="n" id="st-rate">0%</div><div class="l">今月の達成率</div></div>
    <div class="stat-box"><div class="n" id="st-streak">0</div><div class="l">連続達成日</div></div>
  </div>
  <div class="card" id="st-bars"></div>
</section>

<!-- 習慣管理 -->
<section id="manage" class="screen">
  <div class="h1">習慣の管理</div>
  <div class="sub">登録した習慣が毎日のリストに出るよ</div>
  <div class="card" id="manage-list"></div>
  <button class="btn" id="add-btn">＋ 習慣を追加</button>
</section>

<!-- nav -->
<nav class="nav">
  <button data-t="today" class="active"><span class="ic">📋</span>今日</button>
  <button data-t="todo"><span class="ic">📝</span>ToDo</button>
  <button data-t="calendar"><span class="ic">📅</span>カレンダー</button>
  <button data-t="stats"><span class="ic">📊</span>統計</button>
  <button data-t="manage"><span class="ic">⚙️</span>習慣</button>
</nav>

<!-- modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">習慣を追加</h3>
    <div class="field">
      <label>アイコン</label>
      <div class="emoji-pick" id="emoji-pick"></div>
    </div>
    <div class="field">
      <label>名前</label>
      <input type="text" id="in-name" placeholder="例：10分間読書" maxlength="30" />
    </div>
    <div class="field">
      <label>時間（任意）</label>
      <input type="time" id="in-time" />
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="modal-cancel">キャンセル</button>
      <button class="btn" id="modal-save">保存</button>
    </div>
  </div>
</div>

<script>
/* ============ データ層（localStorage） ============ */
const DB = {
  routines() { return JSON.parse(localStorage.getItem('mr_routines') || '[]'); },
  saveRoutines(r) { localStorage.setItem('mr_routines', JSON.stringify(r)); },
  checks() { return JSON.parse(localStorage.getItem('mr_checks') || '{}'); },
  saveChecks(c) { localStorage.setItem('mr_checks', JSON.stringify(c)); },
  todos() { return JSON.parse(localStorage.getItem('mr_todos') || '[]'); },
  saveTodos(t) { localStorage.setItem('mr_todos', JSON.stringify(t)); },
};

/* ============ 日付ユーティリティ ============ */
const pad = n => String(n).padStart(2, '0');
const keyOf = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const DOW = ['日','月','火','水','木','金','土'];
function todayKey() { return keyOf(new Date()); }

/* ============ 状態 ============ */
let calView = new Date(); // カレンダーで表示中の月
let editingId = null;
let pickedEmoji = '✅';
let todoCat = '生活';

/* 人気のToDo プリセット（マイルーティン参考） */
const TODO_PRESETS = {
  '生活': [['🧺','洗濯'],['🍽️','皿洗い'],['☀️','布団を干す'],['🛒','買い物'],['🚽','トイレ掃除'],['🧹','大掃除'],['🗑️','ゴミ捨て'],['♻️','ゴミの分別'],['🧊','冷蔵庫の整理']],
  'セルフケア': [['✂️','眉毛を整える'],['💅','爪切り'],['🧖','パックをする'],['🥗','1週間の食事計画'],['🛏️','寝具の洗濯'],['🪒','脱毛'],['🧴','床の整理'],['👗','着ない服を捨てる'],['💄','メイクの練習']],
  'リラックス': [['🕯️','キャンドルを焚く'],['🛁','半身浴'],['🎬','好きな映画を見る'],['☕','カフェで読書'],['🪴','観葉植物を買う'],['📝','今の気分を整理する'],['💆','アロママッサージ'],['🚶','散歩する'],['🧠','悩みを一つ書く']],
  '勉強・仕事': [['📋','やることの整理'],['🗂️','机の整理整頓'],['📁','ポートフォリオ整理'],['✍️','集中できない理由を書く'],['🎯','今週の目標を書く'],['📚','勉強の計画を立てる'],['📵','邪魔なものを片付ける'],['🗒️','今日学んだことを書く'],['🎒','バッグを整理する']]
};

/* ============ 今日タブ ============ */
function renderToday() {
  const routines = DB.routines();
  const checks = DB.checks();
  const tk = todayKey();
  const done = checks[tk] || {};

  const d = new Date();
  document.getElementById('today-date').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 (${DOW[d.getDay()]})`;

  const list = document.getElementById('today-list');
  if (routines.length === 0) {
    list.innerHTML = `<div class="empty">まだ習慣がありません。<br>下の「習慣」タブから追加してね。</div>`;
  } else {
    // 時間順（未設定は最後）
    const sorted = [...routines].sort((a,b) => (a.time||'99:99').localeCompare(b.time||'99:99'));
    list.innerHTML = `<div class="card">` + sorted.map(r => `
      <div class="item ${done[r.id] ? 'done':''}" data-id="${r.id}">
        <div class="emoji">${r.emoji}</div>
        <div class="body">
          <div class="name">${escapeHtml(r.name)}</div>
          ${r.time ? `<div class="time">${r.time}</div>` : ''}
        </div>
        <div class="check">${done[r.id] ? '✓' : ''}</div>
      </div>`).join('') + `</div>`;
  }

  // リング
  const total = routines.length;
  const cnt = routines.filter(r => done[r.id]).length;
  const pct = total ? Math.round(cnt/total*100) : 0;
  const circ = 201;
  document.getElementById('ring-fg').style.strokeDashoffset = circ - circ*pct/100;
  document.getElementById('ring-pct').textContent = pct + '%';
  document.getElementById('ring-count').textContent = `${cnt} / ${total}`;
  const msg = total===0 ? '習慣を登録して始めよう'
    : pct===100 ? '全部達成！すごい🎉'
    : pct>=50 ? 'その調子！'
    : 'ゆっくりいこう';
  document.getElementById('ring-msg').textContent = msg;
}

function toggleToday(id) {
  const checks = DB.checks();
  const tk = todayKey();
  checks[tk] = checks[tk] || {};
  checks[tk][id] = !checks[tk][id];
  if (!checks[tk][id]) delete checks[tk][id];
  DB.saveChecks(checks);
  renderToday();
}

/* ============ カレンダータブ ============ */
function dayRate(dateKey) {
  const routines = DB.routines();
  if (routines.length === 0) return 0;
  const done = (DB.checks()[dateKey]) || {};
  const cnt = routines.filter(r => done[r.id]).length;
  return cnt / routines.length;
}
function renderCalendar() {
  const y = calView.getFullYear(), m = calView.getMonth();
  document.getElementById('cal-title').textContent = `${y}年${m+1}月`;
  const dowEl = document.getElementById('cal-dow');
  dowEl.innerHTML = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');

  const first = new Date(y, m, 1);
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const startDow = first.getDay();
  const tk = todayKey();
  let cells = '';
  for (let i=0;i<startDow;i++) cells += `<div class="cal-cell blank"></div>`;
  for (let day=1; day<=daysInMonth; day++) {
    const dk = `${y}-${pad(m+1)}-${pad(day)}`;
    const rate = dayRate(dk);
    const bg = rate>0 ? `background:rgba(34,197,94,${0.15+rate*0.75});color:${rate>0.5?'#fff':'var(--ink)'};` : '';
    cells += `<div class="cal-cell ${dk===tk?'today':''}" style="${bg}">${day}${rate>0?`<div class="dot" style="background:${rate>=1?'#16a34a':'transparent'}"></div>`:''}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = cells;
}

/* ============ 統計タブ ============ */
function renderStats() {
  const y = calView.getFullYear(), m = calView.getMonth();
  const now = new Date();
  const useY = now.getFullYear(), useM = now.getMonth();
  document.getElementById('stats-month').textContent = `${useY}年${useM+1}月の記録`;
  const routines = DB.routines();
  const checks = DB.checks();
  const daysInMonth = new Date(useY, useM+1, 0).getDate();
  const today = now.getDate();

  // 今月の全体達成率（今日まで）
  let doneSum = 0, possible = 0;
  for (let day=1; day<=today; day++) {
    const dk = `${useY}-${pad(useM+1)}-${pad(day)}`;
    const done = checks[dk] || {};
    possible += routines.length;
    doneSum += routines.filter(r => done[r.id]).length;
  }
  const rate = possible ? Math.round(doneSum/possible*100) : 0;
  document.getElementById('st-rate').textContent = rate + '%';

  // 連続達成日（100%の日が続いてる数、今日 or 昨日から遡る）
  let streak = 0;
  let d = new Date();
  if (dayRate(keyOf(d)) < 1) d.setDate(d.getDate()-1); // 今日未完了なら昨日から
  while (routines.length>0 && dayRate(keyOf(d)) >= 1) { streak++; d.setDate(d.getDate()-1); }
  document.getElementById('st-streak').textContent = streak;

  // 習慣別の今月達成率
  const bars = document.getElementById('st-bars');
  if (routines.length === 0) {
    bars.innerHTML = `<div class="empty">習慣を追加すると<br>ここに達成率が出るよ</div>`;
    return;
  }
  bars.innerHTML = routines.map(r => {
    let c = 0;
    for (let day=1; day<=today; day++) {
      const dk = `${useY}-${pad(useM+1)}-${pad(day)}`;
      if ((checks[dk]||{})[r.id]) c++;
    }
    const p = Math.round(c/today*100);
    return `<div class="bar-row">
      <div class="emoji">${r.emoji}</div>
      <div class="bl">
        <div class="bn"><span>${escapeHtml(r.name)}</span><span>${p}%</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${p}%"></div></div>
      </div>
    </div>`;
  }).join('');
}

/* ============ 習慣管理タブ ============ */
function renderManage() {
  const routines = DB.routines();
  const el = document.getElementById('manage-list');
  if (routines.length === 0) {
    el.innerHTML = `<div class="empty">習慣がまだありません</div>`;
    return;
  }
  el.innerHTML = routines.map(r => `
    <div class="item" data-edit="${r.id}">
      <div class="emoji">${r.emoji}</div>
      <div class="body">
        <div class="name">${escapeHtml(r.name)}</div>
        ${r.time ? `<div class="time">${r.time}</div>` : ''}
      </div>
      <button class="del" data-del="${r.id}">削除</button>
    </div>`).join('');
}

/* ============ モーダル（追加/編集） ============ */
const EMOJIS = ['✅','💪','📚','💧','🏃','🧘','☀️','🌙','🍎','💊','😴','🦷','🧹','💰','✍️','🎧','🌱','☕','🥗','🚶','📝','🧴','💬','🎯','⏰','🛌','🚿','🍵','🧠','❤️'];
function openModal(id=null) {
  editingId = id;
  const pick = document.getElementById('emoji-pick');
  pick.innerHTML = EMOJIS.map(e => `<button data-e="${e}">${e}</button>`).join('');
  if (id) {
    const r = DB.routines().find(x=>x.id===id);
    document.getElementById('modal-title').textContent = '習慣を編集';
    document.getElementById('in-name').value = r.name;
    document.getElementById('in-time').value = r.time || '';
    pickedEmoji = r.emoji;
  } else {
    document.getElementById('modal-title').textContent = '習慣を追加';
    document.getElementById('in-name').value = '';
    document.getElementById('in-time').value = '';
    pickedEmoji = EMOJIS[0];
  }
  syncEmojiSel();
  document.getElementById('modal-bg').classList.add('show');
}
function syncEmojiSel() {
  document.querySelectorAll('#emoji-pick button').forEach(b =>
    b.classList.toggle('sel', b.dataset.e === pickedEmoji));
}
function closeModal() { document.getElementById('modal-bg').classList.remove('show'); }
function saveModal() {
  const name = document.getElementById('in-name').value.trim();
  if (!name) { document.getElementById('in-name').focus(); return; }
  const time = document.getElementById('in-time').value;
  const routines = DB.routines();
  if (editingId) {
    const r = routines.find(x=>x.id===editingId);
    r.name = name; r.time = time; r.emoji = pickedEmoji;
  } else {
    routines.push({ id: 'r'+Date.now(), name, time, emoji: pickedEmoji });
  }
  DB.saveRoutines(routines);
  closeModal();
  renderAll();
}
function delRoutine(id) {
  if (!confirm('この習慣を削除する？')) return;
  DB.saveRoutines(DB.routines().filter(r=>r.id!==id));
  renderAll();
}

/* ============ ToDoタブ ============ */
function visibleTodos() {
  const tk = todayKey();
  // 未完了は全部（＝繰り越し）＋ 今日完了したものだけ表示。過去に完了したものは消える
  return DB.todos().filter(t => !t.done || t.doneDate === tk);
}
function renderTodo() {
  const tk = todayKey();
  const todos = visibleTodos();
  const list = document.getElementById('todo-list');
  if (todos.length === 0) {
    list.innerHTML = `<div class="empty">今日のToDoはまだありません。<br>下の「人気のToDo」から足せるよ。</div>`;
  } else {
    // 未完了を上、完了を下に
    const sorted = [...todos].sort((a,b)=> (a.done?1:0)-(b.done?1:0));
    list.innerHTML = sorted.map(t => `
      <div class="todo-item ${t.done?'done':''}" data-id="${t.id}">
        <div class="check ${t.done?'':''}" style="${t.done?'background:var(--green);border-color:var(--green);':''}">${t.done?'✓':''}</div>
        <div class="emoji">${t.emoji||'📝'}</div>
        <div class="tx">${escapeHtml(t.text)}</div>
        ${(!t.done && t.created && t.created < tk) ? '<span class="carry">繰り越し</span>' : ''}
        <button class="del" data-del="${t.id}">✕</button>
      </div>`).join('');
  }
  renderTodoPresets();
}
function renderTodoPresets() {
  const cats = Object.keys(TODO_PRESETS);
  document.getElementById('todo-cats').innerHTML =
    cats.map(c => `<button class="${c===todoCat?'active':''}" data-cat="${c}">${c}</button>`).join('');
  // すでに今日追加済みのテキスト
  const tk = todayKey();
  const addedTexts = new Set(DB.todos().filter(t=>t.created===tk).map(t=>t.text));
  document.getElementById('todo-presets').innerHTML =
    TODO_PRESETS[todoCat].map(([e,t]) => `
      <button class="chip ${addedTexts.has(t)?'added':''}" data-e="${e}" data-tx="${escapeHtml(t)}">
        <span class="ce">${e}</span>
        <span class="ct">${escapeHtml(t)}</span>
        <span class="cp">${addedTexts.has(t)?'✓':'＋'}</span>
      </button>`).join('');
}
function addTodo(emoji, text) {
  const todos = DB.todos();
  todos.push({ id:'t'+Date.now()+Math.floor(performance.now()), emoji, text, done:false, created: todayKey() });
  DB.saveTodos(todos);
  renderTodo();
}
function toggleTodo(id) {
  const todos = DB.todos();
  const t = todos.find(x=>x.id===id); if (!t) return;
  t.done = !t.done;
  t.doneDate = t.done ? todayKey() : null;
  DB.saveTodos(todos);
  renderTodo();
}
function delTodo(id) {
  DB.saveTodos(DB.todos().filter(t=>t.id!==id));
  renderTodo();
}

/* ============ 共通 ============ */
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function renderAll(){ renderToday(); renderTodo(); renderCalendar(); renderStats(); renderManage(); }

function switchTab(t) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active', s.id===t));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active', b.dataset.t===t));
  if (t==='todo') renderTodo();
  if (t==='calendar') renderCalendar();
  if (t==='stats') renderStats();
}

/* ============ イベント ============ */
document.querySelectorAll('.nav button').forEach(b => b.onclick = ()=>switchTab(b.dataset.t));
document.getElementById('today-list').onclick = e => {
  const item = e.target.closest('.item'); if (item) toggleToday(item.dataset.id);
};
document.getElementById('manage-list').onclick = e => {
  const del = e.target.closest('[data-del]');
  if (del) { delRoutine(del.dataset.del); return; }
  const edit = e.target.closest('[data-edit]');
  if (edit) openModal(edit.dataset.edit);
};
document.getElementById('add-btn').onclick = ()=>openModal();

// ToDo イベント
document.getElementById('todo-list').onclick = e => {
  const del = e.target.closest('[data-del]');
  if (del) { delTodo(del.dataset.del); return; }
  const item = e.target.closest('.todo-item');
  if (item) toggleTodo(item.dataset.id);
};
document.getElementById('todo-cats').onclick = e => {
  const b = e.target.closest('[data-cat]'); if (!b) return;
  todoCat = b.dataset.cat; renderTodoPresets();
};
document.getElementById('todo-presets').onclick = e => {
  const b = e.target.closest('.chip'); if (!b) return;
  addTodo(b.dataset.e, b.dataset.tx);
};
function submitCustomTodo() {
  const inp = document.getElementById('todo-in');
  const v = inp.value.trim(); if (!v) return;
  addTodo('📝', v); inp.value = '';
}
document.getElementById('todo-add').onclick = submitCustomTodo;
document.getElementById('todo-in').addEventListener('keydown', e => { if (e.key==='Enter') submitCustomTodo(); });
document.getElementById('modal-cancel').onclick = closeModal;
document.getElementById('modal-save').onclick = saveModal;
document.getElementById('modal-bg').onclick = e => { if (e.target.id==='modal-bg') closeModal(); };
document.getElementById('emoji-pick').onclick = e => {
  const b = e.target.closest('button'); if (!b) return;
  pickedEmoji = b.dataset.e; syncEmojiSel();
};
document.getElementById('cal-prev').onclick = ()=>{ calView.setMonth(calView.getMonth()-1); renderCalendar(); };
document.getElementById('cal-next').onclick = ()=>{ calView.setMonth(calView.getMonth()+1); renderCalendar(); };

/* ============ 初回サンプル ============ */
if (DB.routines().length === 0 && !localStorage.getItem('mr_seeded')) {
  DB.saveRoutines([
    { id:'r1', emoji:'💧', name:'コップ1杯の水', time:'07:00' },
    { id:'r2', emoji:'📚', name:'10分間読書', time:'08:00' },
    { id:'r3', emoji:'🚶', name:'10分間散歩', time:'' },
  ]);
  localStorage.setItem('mr_seeded','1');
}

/* PWA */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

renderAll();
</script>
